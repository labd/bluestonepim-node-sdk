name: validate

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        name: Install pnpm

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        id: lint
        if: ${{ !cancelled() }}
        run: pnpm lint

      - name: Format
        id: format
        if: ${{ !cancelled() }}
        run: pnpm format

      - name: Knip
        id: knip
        if: ${{ !cancelled() }}
        run: pnpm lint:knip

      - name: Summary
        if: ${{ !cancelled() }}
        shell: bash
        env:
          LINT: ${{ steps.lint.outcome }}
          FORMAT: ${{ steps.format.outcome }}
          KNIP: ${{ steps.knip.outcome }}
        run: |
          icon() {
            case "$1" in
              success) echo "✅ Pass" ;;
              failure) echo "❌ Fail" ;;
              skipped) echo "⏭️ Skip" ;;
              *)       echo "❔ $1" ;;
            esac
          }
          {
            echo "## Lint"
            echo ""
            echo "| Check  | Result  |"
            echo "| ------ | ------- |"
            echo "| Lint   | $(icon "$LINT") |"
            echo "| Format | $(icon "$FORMAT") |"
            echo "| Knip   | $(icon "$KNIP") |"
          } | tee -a "$GITHUB_STEP_SUMMARY"

  validate:
    name: Validate on Node ${{ matrix.node }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    strategy:
      matrix:
        node: ["22.x", "24.x"]
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        name: Install pnpm

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        id: typecheck
        if: ${{ !cancelled() }}
        run: pnpm typecheck

      - name: Test
        id: test
        if: ${{ !cancelled() }}
        run: pnpm test

      - name: Build
        id: build
        if: ${{ !cancelled() }}
        run: pnpm build

      - name: Summary
        if: ${{ !cancelled() }}
        shell: bash
        env:
          TYPECHECK: ${{ steps.typecheck.outcome }}
          TEST: ${{ steps.test.outcome }}
          BUILD: ${{ steps.build.outcome }}
        run: |
          icon() {
            case "$1" in
              success) echo "✅ Pass" ;;
              failure) echo "❌ Fail" ;;
              skipped) echo "⏭️ Skip" ;;
              *)       echo "❔ $1" ;;
            esac
          }
          {
            echo "## Validate (Node ${{ matrix.node }})"
            echo ""
            echo "| Check     | Result  |"
            echo "| --------- | ------- |"
            echo "| Typecheck | $(icon "$TYPECHECK") |"
            echo "| Test      | $(icon "$TEST") |"
            echo "| Build     | $(icon "$BUILD") |"
          } | tee -a "$GITHUB_STEP_SUMMARY"

  release:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, validate]
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        name: Install pnpm

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm build

      - name: Create and publish versions
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          title: "Release new version"
          commit: "update version"
          publish: pnpm publish:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
